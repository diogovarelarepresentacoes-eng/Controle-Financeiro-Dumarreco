name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_ADMIN_LOGIN: ${{ secrets.VITE_ADMIN_LOGIN }}
          VITE_ADMIN_PASS: ${{ secrets.VITE_ADMIN_PASS }}

      - name: Deploy via FTP (Docker + lftp)
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/dist:/dist:ro" \
            -e FTP_HOST -e FTP_USER -e FTP_PASS \
            alpine:3.19 sh -c '
              apk add --no-cache lftp &&
              lftp -u "$FTP_USER,$FTP_PASS" "$FTP_HOST" -e "
                set ssl:verify-certificate false
                set ftp:ssl-allow true
                set cmd:fail-exit no
                glob -a rm -rf /public_html/*
                set cmd:fail-exit yes
                mirror --reverse --delete --verbose /dist/ /public_html/
                bye
              "
            '
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
