services:
  db:
    image: postgres:16-alpine
    container_name: dumarreco_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-controle_financeiro}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-controle_financeiro}"]
      interval: 10s
      timeout: 5s
      retries: 8
    volumes:
      # Volume nomeado e persistente fora do diretório do projeto
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    container_name: dumarreco_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3333}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-controle_financeiro}?schema=public
    ports:
      - "${API_PORT:-3333}:3333"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    name: dumarreco_postgres_data
