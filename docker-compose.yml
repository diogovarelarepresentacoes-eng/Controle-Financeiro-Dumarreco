services:
  db:
    image: postgres:16-alpine
    container_name: dumarreco_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-controle_financeiro}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-controle_financeiro}"]
      interval: 10s
      timeout: 5s
      retries: 8
    volumes:
      # Volume nomeado e persistente fora do diretório do projeto
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    container_name: dumarreco_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-3333}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-controle_financeiro}?schema=public
      ADMIN_LOGIN: ${ADMIN_LOGIN:-DumarrecoAdmin}
      ADMIN_PASS: ${ADMIN_PASS:-Duma2018}
    ports:
      - "${API_PORT:-3333}:3333"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3333}
        VITE_CRM_API_URL: ${VITE_CRM_API_URL:-http://localhost:4000}
        VITE_ADMIN_LOGIN: ${VITE_ADMIN_LOGIN:-DumarrecoAdmin}
        VITE_ADMIN_PASS: ${VITE_ADMIN_PASS:-}
    container_name: dumarreco_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:
    name: dumarreco_postgres_data
