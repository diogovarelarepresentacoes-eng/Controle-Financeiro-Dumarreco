version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: controle_financeiro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: controle_financeiro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: node:20
    container_name: controle_financeiro_backend
    working_dir: /app/backend
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run dev"
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/controle_financeiro?schema=public
      PORT: 3333
    ports:
      - "3333:3333"
    depends_on:
      - postgres

volumes:
  postgres_data:
